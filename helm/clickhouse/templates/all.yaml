{{/* ─── Helpers ──────────────────────────────────────────────────────────────── */}}
{{- define "clickhouse.name" -}}
{{- default .Release.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
{{- end }}

{{- define "clickhouse.labels" -}}
app: {{ include "clickhouse.name" . }}
helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- end }}

{{/* ─── Secret ───────────────────────────────────────────────────────────────── */}}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickhouse.name" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels: {{- include "clickhouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.auth.password | quote }}
---
{{- end }}

{{/* ─── ConfigMap (extra ClickHouse XML) ───────────────────────────────────── */}}
{{- if .Values.extraConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickhouse.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels: {{- include "clickhouse.labels" . | nindent 4 }}
data:
  extra.xml: |
    {{- .Values.extraConfig | nindent 4 }}
---
{{- end }}

{{/* ─── Headless Service (stable DNS for StatefulSet pods) ────────────────── */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickhouse.name" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels: {{- include "clickhouse.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ include "clickhouse.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.http }}
    - name: tcp
      port: {{ .Values.service.tcp }}
---

{{/* ─── Client Service ──────────────────────────────────────────────────────── */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickhouse.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "clickhouse.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "clickhouse.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.http }}
      targetPort: {{ .Values.service.http }}
    - name: tcp
      port: {{ .Values.service.tcp }}
      targetPort: {{ .Values.service.tcp }}
---

{{/* ─── Ingress (optional) ──────────────────────────────────────────────────── */}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clickhouse.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "clickhouse.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.ingress.host }}]
      secretName: {{ .Values.ingress.tlsSecret | default (printf "%s-tls" (include "clickhouse.name" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "clickhouse.name" . }}
                port:
                  number: {{ .Values.service.http }}
---
{{- end }}

{{/* ─── StatefulSet ─────────────────────────────────────────────────────────── */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clickhouse.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "clickhouse.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "clickhouse.name" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "clickhouse.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "clickhouse.name" . }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.http }}
            - name: tcp
              containerPort: {{ .Values.service.tcp }}
          env:
            - name: CLICKHOUSE_USER
              value: {{ .Values.auth.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (printf "%s-secret" (include "clickhouse.name" .)) }}
                  key: {{ .Values.auth.existingSecretKey | default "password" }}
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/clickhouse
            {{- end }}
            {{- if .Values.extraConfig }}
            - name: config
              mountPath: /etc/clickhouse-server/config.d/extra.xml
              subPath: extra.xml
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.service.http }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.service.http }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
      {{- if .Values.extraConfig }}
      volumes:
        - name: config
          configMap:
            name: {{ include "clickhouse.name" . }}-config
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["{{ .Values.persistence.accessMode }}"]
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
