# values-local.yaml — laptop / kind cluster
# Usage: helm install ch ./clickhouse -f ../values-local.yaml
replicaCount: 1
resources:
  requests: { memory: "512Mi", cpu: "250m" }
  limits:   { memory: "1.5Gi", cpu: "1" }
persistence:
  size: "5Gi"
  storageClass: "standard"
service:
  type: ClusterIP
keeper:
  enabled: false
